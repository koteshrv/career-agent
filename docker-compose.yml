version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./jobs.db:/app/jobs.db
      - ./targets.json:/app/targets.json
      - ./keywords.json:/app/keywords.json
    environment:
      - PYTHONUNBUFFERED=1
      # Auth credentials — change these before exposing the app.
      - APP_USERNAME=${APP_USERNAME:-admin}
      - APP_PASSWORD=${APP_PASSWORD:-admin}
      # Optional: explicit token-signing secret (defaults to the encryption key).
      - AUTH_SECRET=${AUTH_SECRET:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
