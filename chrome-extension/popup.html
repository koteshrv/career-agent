<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      background-color: #09090b;
      color: #fff;
      margin: 0;
    }
    h2 { margin-top: 0; font-size: 16px; color: #fff; }
    .input-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; margin-bottom: 4px; color: #a1a1aa; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: background-color 0.2s;
    }
    button:hover { background-color: #1d4ed8; }
    button:disabled { background-color: #3f3f46; cursor: not-allowed; color: #a1a1aa; }
    #status { margin-top: 12px; font-size: 13px; text-align: center; }
    .success { color: #22c55e; }
    .error { color: #ef4444; }
  </style>
</head>
<body>
  <h2>Job Tracker Pro</h2>
  <div class="input-group">
    <label for="apiUrl">Backend API URL</label>
    <input type="text" id="apiUrl" value="http://127.0.0.1:8000" />
  </div>
  <button id="saveBtn">Save Active Job</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
